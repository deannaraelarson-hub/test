<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaWorld Relayer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      gap: 20px;
    }
    button {
      background-color: #f7931a;
      color: #111;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background-color: #ff9f1a;
    }
    #status {
      max-width: 400px;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>NexaWorld Relayer</h1>
  <button id="connect">Connect Wallet & Execute</button>
  <div id="status">Status: Idle</div>

  <script type="module" src="./app.js"></script>
</body>
</html>
