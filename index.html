<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitcoin Hyper Presale</title>
  <script type="module" src="./app.js" defer></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #fcd34d;
      color: #111;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #fbbf24;
    }
    .status {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Bitcoin Hyper Presale</h1>
  <button id="connect">Connect Wallet & Start</button>
  <div class="status" id="status"></div>
</body>
</html>
